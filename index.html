      // SFX Audio Controller (synthesized retro sounds)
      class AudioController {
        constructor() {
          this.ctx = null;
        }
        init() {
          if (!this.ctx) {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (AudioContextClass) this.ctx = new AudioContextClass();
          }
        }
        playSuccess() {
          try {
            this.init();
            if (!this.ctx) return;
            const now = this.ctx.currentTime;
            const osc1 = this.ctx.createOscillator();
            const osc2 = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc1.type = 'sine';
            osc2.type = 'triangle';
            osc1.frequency.setValueAtTime(523.25, now);
            osc1.frequency.setValueAtTime(659.25, now + 0.08);
            osc1.frequency.setValueAtTime(783.99, now + 0.16);
            osc1.frequency.setValueAtTime(1046.50, now + 0.24);
            osc2.frequency.setValueAtTime(261.63, now);
            osc2.frequency.setValueAtTime(329.63, now + 0.08);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(this.ctx.destination);
            osc1.start(now);
            osc2.start(now);
            osc1.stop(now + 0.4);
            osc2.stop(now + 0.4);
          } catch(e) { console.warn(e); }
        }
        playFailure() {
          try {
            this.init();
            if (!this.ctx) return;
            const now = this.ctx.currentTime;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(220, now);
            osc.frequency.linearRampToValueAtTime(110, now + 0.25);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start(now);
            osc.stop(now + 0.3);
          } catch(e) { console.warn(e); }
        }
        playLevelUp() {
          try {
            this.init();
            if (!this.ctx) return;
            const now = this.ctx.currentTime;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(392.00, now);
            osc.frequency.setValueAtTime(523.25, now + 0.1);
            osc.frequency.setValueAtTime(659.25, now + 0.2);
            osc.frequency.setValueAtTime(783.99, now + 0.3);
            osc.frequency.setValueAtTime(1046.50, now + 0.4);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.7);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start(now);
            osc.stop(now + 0.7);
          } catch(e) { console.warn(e); }
        }

      // Dynamic LucideIcon Component
      const LucideIcon = ({ name, className = '', size = 20, strokeWidth = 2, fill = 'none' }) => {
        const kebabName = name
          .replace(/([a-z0-9])([A-Z])/g, '$1-$2')
          .replace(/([A-Z])([A-Z][a-z])/g, '$1-$2')
          .toLowerCase();
        
        // Find by name (PascalCase or kebab-case or lowercased)
        const iconData = window.lucide?.icons?.[name] || 
                         window.lucide?.icons?.[name.charAt(0).toUpperCase() + name.slice(1)] ||
                         window.lucide?.icons?.[kebabName];
                         
        if (!iconData) {
          return (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={strokeWidth}>
              <circle cx="12" cy="12" r="10" strokeDasharray="4 4" />
            </svg>
          );
        }

        const renderChildren = (nodes) => {
          return nodes.map((node, idx) => {
            const [childTag, childAttrs] = node;
            const reactAttrs = {};
            Object.keys(childAttrs).forEach(key => {
              const reactKey = key.replace(/-([a-z])/g, (g) => g[1].toUpperCase());
              reactAttrs[reactKey] = childAttrs[key];
            });
            reactAttrs.key = idx;
            return React.createElement(childTag, reactAttrs);
          });
        };

        const finalAttrs = {
          xmlns: 'http://www.w3.org/2000/svg',
          className: `lucide lucide-${kebabName} ${className}`,
          width: size,
          height: size,
          viewBox: '0 0 24 24',
          fill: fill === 'currentColor' ? 'currentColor' : fill,
          stroke: 'currentColor',
          strokeWidth: strokeWidth,
          strokeLinecap: 'round',
          strokeLinejoin: 'round'
        };

        return React.createElement('svg', finalAttrs, renderChildren(iconData));
      };

      // Custom SVG Bar Chart Component for Statistics Tab
      const SVGBarChart = ({ data, lang }) => {
        const maxValue = Math.max(...data.map(d => d.minutes), 15);
        const height = 150;
        const width = 450;
        const padding = 20;

        return (
          <div className="w-full select-none pt-4">
            <svg viewBox="0 0 450 180" className="w-full h-full">
              {/* Horizontal grid lines */}
              {[0, 0.25, 0.5, 0.75, 1].map((p, i) => {
                const y = padding + (height - padding * 2) * (1 - p);
                const val = Math.round(maxValue * p);
                return (
                  <g key={i} className="opacity-30 dark:opacity-10">
                    <line x1="40" y1={y} x2="420" y2={y} stroke="#94A3B8" strokeWidth="1" strokeDasharray="3 3" />
                    <text x="30" y={y + 4} fill="#94A3B8" fontSize="9" fontWeight="bold" textAnchor="end">{val}m</text>
                  </g>
                );
              })}
              
              {/* Bars */}
              {data.map((d, i) => {
                const x = 50 + i * 50;
                const barHeight = (d.minutes / maxValue) * (height - padding * 2);
                const y = height - padding - barHeight;
                
                return (
                  <g key={i} className="group">
                    <rect
                      x={x}
                      y={y}
                      width="26"
                      height={Math.max(barHeight, 2)}
                      rx="4"
                      fill="#58CC02"
                      className="transition-all duration-300 hover:fill-emerald-400 cursor-pointer"

                    <text

                    <title>{d.minutes} {lang === 'pt' ? 'minutos' : 'minutes'}</title>
                  </g>
                );
              })}

        );

          { id: 'dq-1', pt: 'Praticar hoje', en: 'Practice today', target: 1, current: progress.studyTimeTodayMinutes > 0 ? 1 : 0, xp: 25 },
          { id: 'dq-2', pt: 'Acumular 50 XP', en: 'Accumulate 50 XP', target: 50, current: Math.min(50, progress.xp % 100), xp: 40 }

              <div className={`bg-gradient-to-r ${subjectColors.banner} text-white rounded-2xl p-5 shadow-md relative overflow-hidden`}>

                  <div className="flex items-center gap-2">
                    <span className="bg-white/20 text-[10px] font-mono px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">
                      {selectedSubject.toUpperCase()}
                    </span>
                    <span className="bg-white/20 text-[10px] font-mono px-2 py-0.5 rounded-full font-bold">
                      Nível {currentSubjectLevel}
                    </span>
                  </div>
                  <h2 className="text-xl font-extrabold tracking-tight">
                    {selectedSubject === 'html' ? 'HTML5 & Estruturas Web' : selectedSubject === 'python' ? 'Lógica de Programação Python' : 'JavaScript Interativo'}
                  </h2>
                  <p className="text-white/80 text-xs max-w-md">
                    {selectedSubject === 'html' 
                      ? 'Aprenda a estruturar páginas web modernas usando tags semânticas e atributos úteis.' 
                      : selectedSubject === 'python' 
                        ? 'Domine a sintaxe do Python, controle fluxos condicionais e lógica de variáveis.' 
                        : 'Adicione vida e dinâmica ao navegador controlando elementos via manipulação de DOM.'}
                  </p>
                </div>
              </div>

              {/* Map checkpoint nodes list */}
              <div className="flex flex-col items-center py-4 space-y-10 relative">
                <div className="absolute w-1 bg-slate-200 dark:bg-slate-800 top-4 bottom-4 left-1/2 -translate-x-1/2 pointer-events-none" />

                {filteredLessons.map((lesson, idx) => {
                  const isCompleted = idx < currentSubjectLevel - 1;
                  const isUnlocked = idx <= currentSubjectLevel - 1;
                  const staggeredClass = idx % 2 === 0 ? 'translate-x-4 md:translate-x-8' : '-translate-x-4 md:-translate-x-8';

                  return (
                    <div key={lesson.id} className={`relative flex flex-col items-center ${staggeredClass}`}>
                      <button
                        disabled={!isUnlocked}
                        onClick={() => onSelectLesson(lesson)}
                        className={`w-16 h-16 rounded-full flex items-center justify-center border-b-4 transition-all tactile-card ${
                          isCompleted
                            ? `${subjectColors.bg} ${subjectColors.border} text-white`
                            : isUnlocked
                              ? `${subjectColors.bg} ${subjectColors.border} hover:scale-105 text-white shadow-lg`
                              : 'bg-slate-300 dark:bg-slate-800 border-slate-400 dark:border-slate-900 text-slate-400 cursor-not-allowed'
                        }`}
                      >
                        {isCompleted ? (
                          <LucideIcon name="CheckCircle" strokeWidth={3} size={24} />
                        ) : !isUnlocked ? (
                          <LucideIcon name="Lock" size={20} />
                        ) : (
                          <LucideIcon name="Play" className="fill-current ml-0.5" size={24} />
                        )}
                      </button>
                      
                      <div className="mt-2 text-center">
                        <span className="text-[9px] font-mono font-bold text-slate-400 dark:text-slate-500 uppercase">Lição {idx + 1}</span>
                        <h4 className="text-xs font-extrabold text-slate-700 dark:text-slate-200 uppercase">{lesson.title[lang]}</h4>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Right Quests/Achievements Sideboard */}
            <div className="space-y-6">
              {/* Daily Quests */}
              <div className="bg-white dark:bg-slate-900 p-4 rounded-2xl border-2 border-slate-200 dark:border-slate-800/80 shadow-sm space-y-3">
                <h3 className="font-black text-xs text-slate-700 dark:text-slate-200 uppercase flex items-center gap-1.5">
                  <LucideIcon name="Trophy" className="text-amber-500" size={16} />
                  <span>{lang === 'pt' ? 'Missões Diárias' : 'Daily Quests'}</span>
                </h3>
                <div className="space-y-3">
                  {dailyQuests.map(q => {
                    const pct = Math.min(100, (q.current / q.target) * 100);
                    return (
                      <div key={q.id} className="space-y-1">
                        <div className="flex justify-between text-xs font-bold uppercase">
                          <span className="text-slate-600 dark:text-slate-400">{lang === 'pt' ? q.pt : q.en}</span>
                          <span className="text-[#58CC02]">{q.current}/{q.target}</span>
                        </div>
                        <div className="w-full bg-slate-100 dark:bg-slate-800 h-2.5 rounded-full overflow-hidden">
                          <div className="bg-[#58CC02] h-full" style={{ width: `${pct}%` }} />
                        </div>
                        <span className="text-[10px] text-slate-400 block text-right font-bold font-mono">+{q.xp} XP BONUS</span>
                      </div>

              {/* Achievements Log */}
              <div className="bg-white dark:bg-slate-900 p-4 rounded-2xl border-2 border-slate-200 dark:border-slate-800/80 shadow-sm space-y-3">
                <h3 className="font-black text-xs text-slate-700 dark:text-slate-200 uppercase flex items-center gap-1.5">
                  <LucideIcon name="Award" className="text-emerald-500" size={16} />
                  <span>{lang === 'pt' ? 'Conquistas' : 'Achievements'}</span>
                </h3>
                <div className="space-y-2 max-h-64 overflow-y-auto pr-1">
                  {ACHIEVEMENTS.map(ach => {
                    const isUnlocked = progress.unlockedAchievements.includes(ach.id);
                    return (
                      <div key={ach.id} className={`flex items-center gap-2.5 p-2 rounded-xl border ${isUnlocked ? 'bg-emerald-50/25 dark:bg-emerald-950/10 border-emerald-500/20' : 'border-transparent'}`}>
                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${isUnlocked ? 'bg-[#58CC02] text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-400'}`}>
                          <LucideIcon name={ach.icon} size={16} />

                        <div className="flex-1 min-w-0">
                          <h4 className={`text-xs font-extrabold truncate ${isUnlocked ? 'text-slate-800 dark:text-slate-200' : 'text-slate-500'}`}>{ach.title[lang]}</h4>
                          <p className="text-[10px] text-slate-400 dark:text-slate-500 truncate leading-snug">{ach.desc[lang]}</p>

      };

      // Quiz gameplay arena overlay container
      const QuizContainer = ({ lesson, lang, onClose, onFinish }) => {
        const [idx, setIdx] = useState(0);
        const [selected, setSelected] = useState(null);
        const [ordered, setOrdered] = useState([]);
        const [lives, setLives] = useState(5);
        const [checked, setChecked] = useState(false);
        const [isCorrect, setIsCorrect] = useState(false);
        const [gameState, setGameState] = useState('playing'); // playing, completed, failed
        const [xpEarned, setXpEarned] = useState(0);

        const currentEx = lesson.exercises[idx];

        useEffect(() => {
          setSelected(null);
          setOrdered([]);
          setChecked(false);
          setIsCorrect(false);
        }, [idx]);

        if (!currentEx) return null;

        const handleOptionSelect = (opt) => {
          if (checked) return;
          setSelected(opt);
        };

        const handleOrderToggle = (opt) => {
          if (checked) return;
          if (ordered.includes(opt)) {
            setOrdered(ordered.filter(o => o !== opt));
          } else {
            setOrdered([...ordered, opt]);
          }
        };

        const handleCheck = () => {
          if (checked) return;
          let correct = false;
          if (currentEx.type === 'multiple-choice' || currentEx.type === 'fill-blank') {
            correct = selected === currentEx.correctAnswer;
          } else if (currentEx.type === 'order-code') {
            correct = ordered.join('|') === currentEx.correctAnswer;
          }

          setIsCorrect(correct);
          setChecked(true);

          if (correct) {
            sfx.playSuccess();
            setXpEarned(prev => prev + 10);
          } else {
            sfx.playFailure();
            const nextLives = lives - 1;
            setLives(nextLives);
            if (nextLives <= 0) setGameState('failed');
          }
        };

        const handleContinue = () => {
          if (idx + 1 < lesson.exercises.length) {
            setIdx(idx + 1);
          } else {
            sfx.playLevelUp();
            setGameState('completed');
          }
        };

        const handleExit = () => {
          if (gameState === 'completed') {
            onFinish(xpEarned + lesson.xpReward, 5 - lives, true);
          } else if (gameState === 'failed') {
            onFinish(Math.round(xpEarned / 2), 5, false);
          } else {
            onClose();
          }
        };

        const progressPct = ((idx) / lesson.exercises.length) * 100;

        return (
          <div className="fixed inset-0 bg-white dark:bg-slate-950 z-50 flex flex-col justify-between animate-fade-in text-slate-800 dark:text-slate-100">
            {/* Header progress line */}
            <header className="p-4 border-b border-slate-100 dark:border-slate-900 flex items-center justify-between max-w-4xl w-full mx-auto">
              <button onClick={handleExit} className="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-850 rounded-full transition-all">
                <LucideIcon name="X" size={24} />
              </button>
              <div className="flex-1 mx-4 max-w-lg bg-slate-100 dark:bg-slate-800 h-3.5 rounded-full overflow-hidden">
                <div className="bg-[#58CC02] h-full transition-all duration-300" style={{ width: `${gameState === 'completed' ? 100 : progressPct}%` }} />
              </div>
              <div className="flex items-center gap-1 text-rose-500 font-bold">
                <LucideIcon name="Heart" className="fill-current animate-pulse" size={20} />
                <span className="font-mono text-sm">{lives}</span>
              </div>
            </header>

            {/* Content panel */}
            <main className="flex-1 overflow-y-auto px-4 py-6 flex flex-col items-center justify-center max-w-xl w-full mx-auto">
              {gameState === 'playing' && (
                <div className="w-full space-y-6">
                  {/* Prompt */}
                  <div className="space-y-1">
                    <span className="text-[9px] font-mono bg-emerald-50 dark:bg-emerald-950/40 text-emerald-600 dark:text-emerald-400 px-2 py-0.5 rounded-full font-black uppercase">
                      {currentEx.type.replace('-', ' ')}
                    </span>
                    <h2 className="text-base md:text-lg font-extrabold">{currentEx.question[lang]}</h2>
                  </div>

                  {/* Code snippet visualization */}
                  {currentEx.codeSnippet && (
                    <div className="bg-slate-900 dark:bg-black rounded-xl p-4 border border-slate-800 font-mono text-xs text-slate-200 shadow-md">
                      <pre className="whitespace-pre-wrap leading-relaxed">
                        {currentEx.codeSnippet.split('___1').map((part, index, arr) => (
                          <React.Fragment key={index}>
                            {part}
                            {index < arr.length - 1 && (
                              <span className={`inline-block mx-1 px-2.5 py-0.5 rounded border-2 font-bold font-sans ${selected ? 'bg-emerald-500/20 border-emerald-500 text-emerald-400' : 'bg-slate-800 border-dashed border-slate-500 text-slate-400'}`}>
                                {selected || '___'}
                              </span>
                            )}
                          </React.Fragment>
                        ))}
                      </pre>
                    </div>
                  )}

                  {/* Option Widgets */}
                  {currentEx.type === 'multiple-choice' && (
                    <div className="grid grid-cols-1 gap-2.5">
                      {currentEx.options.map((opt, i) => (
                        <button
                          key={opt}
                          disabled={checked}
                          onClick={() => handleOptionSelect(opt)}
                          className={`w-full text-left px-4 py-3 rounded-xl border-2 font-bold text-xs flex items-center justify-between transition-all border-b-4 ${
                            selected === opt
                              ? 'border-[#58CC02] bg-[#58CC02]/5 text-[#58CC02] border-b-[#46a302]'
                              : 'border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300'
                          }`}
                        >
                          <span>{opt}</span>
                          <span className="text-[10px] font-mono px-1.5 py-0.5 rounded bg-slate-100 dark:bg-slate-850 text-slate-400">{i + 1}</span>
                        </button>
                      ))}
                    </div>
                  )}

                  {currentEx.type === 'fill-blank' && (
                    <div className="flex flex-wrap gap-2.5 justify-center pt-2">
                      {currentEx.options.map((opt) => (
                        <button
                          key={opt}
                          disabled={checked}
                          onClick={() => handleOptionSelect(opt)}
                          className={`px-4 py-2.5 rounded-xl border-2 font-bold text-xs border-b-4 ${
                            selected === opt
                              ? 'border-[#58CC02] bg-[#58CC02]/10 text-[#58CC02] border-b-[#46a302]'
                              : 'border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300 bg-slate-50 dark:bg-slate-850'
                          }`}
                        >
                          {opt}
                        </button>
                      ))}
                    </div>
                  )}

                  {currentEx.type === 'order-code' && (
                    <div className="space-y-4">
                      {/* Drop slots container */}
                      <div className="p-3.5 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 min-h-[100px] space-y-1.5">
                        <p className="text-[10px] text-slate-400 uppercase font-mono font-bold">{lang === 'pt' ? 'Sua sequência:' : 'Your sequence:'}</p>
                        {ordered.length === 0 ? (
                          <div className="text-xs text-slate-400 italic py-4 text-center">{lang === 'pt' ? 'Selecione os blocos abaixo para ordená-los...' : 'Select blocks below...'}</div>
                        ) : (
                          <div className="flex flex-col gap-1.5 animate-fade-in">
                            {ordered.map((item) => (
                              <div key={item} className="flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 rounded-lg p-2 text-xs font-mono font-bold text-emerald-600 dark:text-emerald-400">
                                <LucideIcon name="CornerDownRight" size={14} />
                                <span>{item}</span>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>

                      {/* Bank button selection */}
                      <div className="flex flex-wrap gap-2">
                        {currentEx.options.map((opt) => {
                          const isUsed = ordered.includes(opt);
                          return (
                            <button
                              key={opt}
                              disabled={checked}
                              onClick={() => handleOrderToggle(opt)}
                              className={`px-3.5 py-2 rounded-xl border font-mono text-xs font-bold transition-all ${
                                isUsed
                                  ? 'bg-slate-100 dark:bg-slate-800 text-slate-400 border-dashed'
                                  : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300'
                              }`}
                            >
                              {opt}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* Hint indicator */}
                  <div className="flex gap-2 p-3 rounded-xl bg-amber-500/5 border border-amber-500/10 text-amber-600 dark:text-amber-400 text-xs">
                    <LucideIcon name="Info" size={16} />
                    <p>{currentEx.hint[lang]}</p>
                  </div>
                </div>
              )}

              {gameState === 'failed' && (
                <div className="text-center space-y-4 max-w-sm">
                  <div className="w-16 h-16 rounded-full bg-rose-100 dark:bg-rose-950/40 text-rose-500 flex items-center justify-center mx-auto shadow-md">
                    <LucideIcon name="AlertTriangle" size={32} />
                  </div>
                  <h2 className="text-xl font-extrabold">{lang === 'pt' ? 'Sem vidas restantes!' : 'No lives left!'}</h2>
                  <p className="text-xs text-slate-400 dark:text-slate-500 leading-relaxed">
                    {lang === 'pt' ? 'Não se preocupe! Recarregue suas vidas na aba principal e tente de novo.' : 'Don\'t worry! Recharge your hearts and try again.'}
                  </p>
                  <button onClick={handleExit} className="w-full py-3 bg-rose-500 hover:bg-rose-600 text-white font-extrabold rounded-xl transition-all">
                    {lang === 'pt' ? 'Voltar à Jornada' : 'Back to Journey'}
                  </button>
                </div>
              )}

              {gameState === 'completed' && (
                <div className="text-center space-y-4 max-w-sm">
                  <div className="w-16 h-16 rounded-full bg-emerald-500 text-white flex items-center justify-center mx-auto shadow-md">
                    <LucideIcon name="Award" size={32} />
                  </div>
                  <h2 className="text-xl font-extrabold">{lang === 'pt' ? 'Parabéns!' : 'Congratulations!'}</h2>
                  <p className="text-xs text-slate-400 dark:text-slate-500 leading-relaxed">
                    {lang === 'pt' ? 'Você concluiu a lição com sucesso!' : 'You completed the lesson successfully!'}
                  </p>
                  <div className="bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-xl p-3 flex justify-around text-center">
                    <div>
                      <span className="text-[10px] text-slate-400 font-mono uppercase block">XP</span>
                      <span className="text-base font-black text-emerald-500">+{xpEarned + lesson.xpReward}</span>
                    </div>
                    <div className="w-px bg-slate-200 dark:bg-slate-800 h-8 self-center" />
                    <div>
                      <span className="text-[10px] text-slate-400 font-mono uppercase block">{lang === 'pt' ? 'Vida' : 'Life'}</span>
                      <span className="text-base font-black text-rose-500">{lives}/5</span>
                    </div>
                  </div>
                  <button onClick={handleExit} className="w-full py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-extrabold rounded-xl transition-all">
                    {lang === 'pt' ? 'Voltar à Jornada' : 'Back to Journey'}
                  </button>
                </div>
              )}
            </main>

            {/* Answer check bar */}
            {gameState === 'playing' && (
              <footer className={`p-4 border-t-2 border-slate-200 dark:border-slate-850 ${
                checked ? (isCorrect ? 'bg-[#58CC02]/10' : 'bg-rose-500/10') : 'bg-white dark:bg-slate-950'
              }`}>
                <div className="max-w-xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3">
                  <div className="flex items-center gap-2.5 w-full sm:w-auto">
                    {checked && (
                      <>
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-white ${isCorrect ? 'bg-[#58CC02]' : 'bg-rose-500'}`}>
                          <LucideIcon name={isCorrect ? 'CheckCircle' : 'AlertTriangle'} size={18} />
                        </div>
                        <div>
                          <p className={`font-black text-xs uppercase ${isCorrect ? 'text-[#58CC02]' : 'text-rose-600'}`}>
                            {isCorrect ? (lang === 'pt' ? 'Excelente! Correto' : 'Correct!') : (lang === 'pt' ? 'Incorreto' : 'Incorrect')}
                          </p>
                          {!isCorrect && <p className="text-[10px] font-mono text-slate-500 uppercase">{lang === 'pt' ? 'Solução:' : 'Solution:'} <b className="font-sans font-bold text-rose-500">{currentEx.correctAnswer.replace(/\|/g, ' ')}</b></p>}
                        </div>
                      </>
                    )}
                  </div>
                  <button
                    disabled={!selected && currentEx.type !== 'order-code' && ordered.length === 0}
                    onClick={checked ? handleContinue : handleCheck}
                    className={`w-full sm:w-40 py-2.5 rounded-xl font-black text-xs uppercase tracking-wider transition-all shadow-sm ${
                      checked
                        ? (isCorrect ? 'bg-[#58CC02] hover:bg-emerald-500 text-white' : 'bg-rose-500 hover:bg-rose-400 text-white')
                        : 'bg-slate-900 hover:bg-black text-white dark:bg-[#58CC02] dark:hover:bg-emerald-500 disabled:opacity-35'
                    }`}
                  >
                    {checked ? (lang === 'pt' ? 'Continuar' : 'Continue') : (lang === 'pt' ? 'Verificar' : 'Verify')}
                  </button>
                </div>
              </footer>
            )}
          </div>
        );
      };

      // Dueling Screen (Multiplayer Friend Challenge)
      const Dueling = ({ lang, progress, onWinDuel }) => {
        const [duelState, setDuelState] = useState('lobby'); // lobby, searching, playing, ended
        const [idx, setIdx] = useState(0);
        const [score, setScore] = useState(0);
        const [timer, setTimer] = useState(15);
        const [selectedAns, setSelectedAns] = useState(null);

        const rivals = [
          { id: 'r-1', name: 'Hugo_Vader', level: 3, avatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=80&h=80&fit=crop' },
          { id: 'r-2', name: 'Ana_Coders', level: 4, avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=80&h=80&fit=crop' }
        ];

        const questions = [
          { q: 'Qual operador compara valor e tipo?', o: ['===', '==', '=', '!='], a: '===' },
          { q: 'Qual método remove o último item de um array?', o: ['pop()', 'push()', 'shift()', 'remove()'], a: 'pop()' },
          { q: 'Qual tag representa o rodapé da página?', o: ['<footer>', '<bottom>', '<end>', '<aside>'], a: '<footer>' }
        ];

        const currentQ = questions[idx];

        useEffect(() => {
          if (duelState !== 'playing') return;
          if (timer <= 0) {
            handleAnswer('');
            return;
          }
          const tid = setInterval(() => setTimer(t => t - 1), 1000);
          return () => clearInterval(tid);
        }, [timer, duelState]);

        const startDuel = () => {
          setDuelState('searching');
          setTimeout(() => {
            setDuelState('playing');
            setIdx(0);
            setScore(0);
            setTimer(15);
            setSelectedAns(null);
          }, 2000);
        };

        const handleAnswer = (opt) => {
          if (selectedAns !== null) return;
          setSelectedAns(opt);
          const correct = opt === currentQ.a;
          if (correct) {
            setScore(s => s + 1);
            sfx.playSuccess();
          } else {
            sfx.playFailure();
          }

          setTimeout(() => {

              )}
            </div>

            {!progress.githubSynced ? (
              <form onSubmit={handleSubmit} className="flex gap-2">
                <input
                  required
                  placeholder={lang === 'pt' ? 'Usuário do GitHub' : 'GitHub Username'}
                  value={username}
                  onChange={e => setUsername(e.target.value)}
                  className="flex-1 px-3 py-2 text-xs bg-slate-50 dark:bg-slate-800 border rounded-xl focus:outline-none"
                />
                <button type="submit" disabled={syncing} className="px-4 py-2 bg-[#58CC02] text-white text-xs font-black uppercase rounded-xl">
                  {syncing ? '...' : (lang === 'pt' ? 'Conectar' : 'Connect')}
                </button>
              </form>
            ) : (
              <div className="space-y-4">
                <p className="text-xs text-slate-400 uppercase font-mono font-bold">{lang === 'pt' ? 'Matriz de Contribuições (Mock):' : 'Contribution Graph:'}</p>
                <div className="flex gap-1 justify-center p-3 rounded-lg bg-slate-50 dark:bg-slate-950 overflow-x-auto">
                  <div className="grid grid-rows-5 gap-1">
                    {gridValues.map((row, rIdx) => (
                      <div key={rIdx} className="flex gap-1">
                        {row.map((val, cIdx) => (
                          <div key={cIdx} className={`w-3 h-3 rounded-sm ${getCellColor(val)} hover:scale-110 transition-all`} />
                        ))}
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      // Profile settings & Danger Zone UI
      const ProfileSettings = ({ lang, setLang, theme, toggleTheme, progress, onUpdateProgress, onResetProgress }) => {
        const handleBackup = () => {
          alert(lang === 'pt' ? 'Backup automático enviado para a nuvem CodeLingo!' : 'Automatic state backup synchronized successfully!');
        };

        const handleResetClick = () => {
          const confirmed = window.confirm(lang === 'pt' ? 'Tem certeza absoluta?' : 'Are you sure you want to delete all data?');
          if (confirmed) {
            onResetProgress();
          }
        };

        return (
          <div className="space-y-6 pb-12 max-w-xl mx-auto animate-fade-in">
            <h2 className="text-lg font-black uppercase tracking-tight">{lang === 'pt' ? 'Ajustes Gerais' : 'General Adjustments'}</h2>

            <div className="bg-white dark:bg-slate-900 p-5 rounded-2xl border-2 border-slate-200 dark:border-slate-800 shadow-sm divide-y divide-slate-100 dark:divide-slate-800/80">
              <div className="flex justify-between items-center py-3">
                <div>
                  <h4 className="text-xs font-bold">{lang === 'pt' ? 'Backup Automático' : 'Auto Backup'}</h4>
                  <p className="text-[10px] text-slate-400">Guarde seu progresso na nuvem</p>
                </div>
                <button onClick={handleBackup} className="px-3 py-1 bg-slate-50 dark:bg-slate-800 border text-xs rounded-lg font-bold">
                  Backup Now
                </button>
              </div>

              <div className="flex justify-between items-center py-3">
                <div>
                  <h4 className="text-xs font-bold">{lang === 'pt' ? 'Zona de Perigo' : 'Danger Zone'}</h4>
                  <p className="text-[10px] text-slate-400">Excluir todos os registros salvos</p>
                </div>
                <button onClick={handleResetClick} className="px-3 py-1 bg-rose-500 hover:bg-rose-600 text-white text-xs rounded-lg font-bold">
                  Zerar Tudo
                </button>
              </div>
            </div>
          </div>
        );
      };

      // Root App Component Container
      const App = () => {
        const DEFAULT_PROGRESS = {
          xp: 45,
          level: 1,
          hearts: 5,
          streak: 1,
          lastStudyDate: new Date().toISOString().split('T')[0],
          unlockedAchievements: [],
          htmlLevel: 1,
          pythonLevel: 1,
          jsLevel: 1,
          dailyGoalMinutes: 15,
          studyTimeTodayMinutes: 0,
          weeklyStudyTime: [
            { day: 'Seg', minutes: 12 },
            { day: 'Ter', minutes: 0 },
            { day: 'Qua', minutes: 15 },
            { day: 'Qui', minutes: 8 },
            { day: 'Sex', minutes: 0 },
            { day: 'Sáb', minutes: 10 },
            { day: 'Dom', minutes: 5 }
          ],
          githubUsername: null,
          githubSynced: false,
          isOffline: false,
          syncStatus: 'synced',
          twoFactorEnabled: false,
          biometricsEnabled: false
        };

        const [progress, setProgress] = useState(() => {
          try {
            const saved = localStorage.getItem('codelingo_user_progress');
            if (saved) return { ...DEFAULT_PROGRESS, ...JSON.parse(saved) };
          } catch(e) { console.warn(e); }
          return DEFAULT_PROGRESS;
        });

        const [currentTab, setCurrentTab] = useState('lessons');
        const [lang, setLang] = useState('pt');
        const [theme, setTheme] = useState(() => {
          try {
            const t = localStorage.getItem('codelingo_theme');
            if (t === 'light' || t === 'dark') return t;
          } catch(e) { console.warn(e); }
          return 'dark';
        });

        const [activeLesson, setActiveLesson] = useState(null);
        const [toast, setToast] = useState(null);

        useEffect(() => {
          localStorage.setItem('codelingo_user_progress', JSON.stringify(progress));
        }, [progress]);

        useEffect(() => {
          localStorage.setItem('codelingo_theme', theme);
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        }, [theme]);

        const showToast = (title, desc) => {
          setToast({ id: Math.random().toString(), title, desc });
          setTimeout(() => setToast(null), 4500);
        };

        const calculateLevel = (newXp, oldLevel) => {
          const l = Math.floor(newXp / 100) + 1;
          if (l > oldLevel) {
            setTimeout(() => {
              sfx.playLevelUp();
              showToast(lang === 'pt' ? 'NOVO NÍVEL!' : 'LEVEL UP!', lang === 'pt' ? `Parabéns! Você alcançou o nível ${l}!` : `Reached level ${l}!`);
            }, 800);
          }
          return l;
        };

        const auditAchievements = (p) => {
          const u = [...p.unlockedAchievements];
          if (!u.includes('ach-1') && (p.htmlLevel > 1 || p.pythonLevel > 1 || p.jsLevel > 1)) {
            u.push('ach-1');
            showToast('Conquista Desbloqueada!', 'Primeiro Passo - Lição Concluída');
          }
          if (!u.includes('ach-3') && p.xp >= 200) {
            u.push('ach-3');
            showToast('Conquista Desbloqueada!', 'Acumulador de XP - 200 XP');
          }
          if (!u.includes('ach-4') && p.githubSynced) {
            u.push('ach-4');
            showToast('Conquista Desbloqueada!', 'Dev Conectado');
          }
          return u;
        };

        const handleFinishLesson = (xp, livesLost, didPass) => {
          setActiveLesson(null);
          if (!didPass) return;

          setProgress(prev => {
            let nextHtml = prev.htmlLevel;
            let nextPython = prev.pythonLevel;
            let nextJs = prev.jsLevel;

            if (activeLesson?.subject === 'html') nextHtml = prev.htmlLevel + 1;
            if (activeLesson?.subject === 'python') nextPython = prev.pythonLevel + 1;
            if (activeLesson?.subject === 'javascript') nextJs = prev.jsLevel + 1;

            const nextXp = prev.xp + xp;
            const nextLvl = calculateLevel(nextXp, prev.level);

            const updated = {
              ...prev,
              xp: nextXp,
              level: nextLvl,
              htmlLevel: nextHtml,
              pythonLevel: nextPython,
              jsLevel: nextJs,
              studyTimeTodayMinutes: prev.studyTimeTodayMinutes + 15,
              hearts: Math.min(5, prev.hearts + 1)
            };
            updated.unlockedAchievements = auditAchievements(updated);
            return updated;
          });
        };

        const handleRestoreHearts = () => {
          if (progress.xp < 100) {
            alert(lang === 'pt' ? 'Você precisa de 100 XP!' : 'You need 100 XP!');
            return;
          }
          setProgress(prev => ({ ...prev, xp: prev.xp - 100, hearts: 5 }));
        };

        const handleSyncGitHub = (user) => {
          setProgress(prev => {
            const next = { ...prev, githubUsername: user, githubSynced: true };
            next.unlockedAchievements = auditAchievements(next);
            return next;
          });
        };

        const handleWinDuel = (xp) => {
          setProgress(prev => {
            const next = { ...prev, xp: prev.xp + xp };
            next.level = calculateLevel(next.xp, prev.level);
            return next;
          });
        };

        const handleGoalChange = (g) => {
          setProgress(prev => ({ ...prev, dailyGoalMinutes: g }));
        };

        const handleResetProgress = () => {
          setProgress(DEFAULT_PROGRESS);
          showToast('Reiniciado', 'Seu progresso foi apagado!');
        };

        return (
          <div className="flex flex-col md:flex-row min-h-screen">
            {activeLesson ? (
              <QuizContainer
                lesson={activeLesson}
                lang={lang}
                onClose={() => setActiveLesson(null)}
                onFinish={handleFinishLesson}
              />
            ) : (
              <>
                <Sidebar
                  currentTab={currentTab}
                  setCurrentTab={setCurrentTab}
                  lang={lang}
                  setLang={setLang}
                  theme={theme}
                  toggleTheme={() => setTheme(theme === 'light' ? 'dark' : 'light')}
                  progress={progress}
                  onRestoreHearts={handleRestoreHearts}
                />

                <main className="flex-grow p-4 md:p-8 max-w-4xl mx-auto w-full pb-20 md:pb-8">
                  {currentTab === 'lessons' && (
                    <div className="space-y-6">
                      <LessonsList
                        lessons={LESSONS}
                        progress={progress}
                        onSelectLesson={setActiveLesson}
                        lang={lang}
                      />
                      <GitHubSync
                        lang={lang}
                        progress={progress}
                        onSync={handleSyncGitHub}
                      />
                    </div>
                  )}

                  {currentTab === 'ranking' && (
                    <Leaderboard lang={lang} progress={progress} />
                  )}

                  {currentTab === 'duels' && (
                    <Dueling lang={lang} progress={progress} onWinDuel={handleWinDuel} />
                  )}

                  {currentTab === 'forum' && (
                    <Forum lang={lang} />
                  )}

                  {currentTab === 'stats' && (
                    <Stats lang={lang} progress={progress} onChangeGoal={handleGoalChange} />
                  )}

                  {currentTab === 'settings' && (
                    <ProfileSettings
                      lang={lang}
                      setLang={setLang}
                      theme={theme}
                      toggleTheme={() => setTheme(theme === 'light' ? 'dark' : 'light')}
                      progress={progress}
                      onUpdateProgress={(u) => setProgress(prev => ({ ...prev, ...u }))}
                      onResetProgress={handleResetProgress}
                    />
                  )}
                </main>

                {/* Toast alert popup */}
                {toast && (
                  <div className="fixed bottom-16 md:bottom-6 right-6 bg-slate-900 border border-slate-800 text-white p-4 rounded-xl flex items-center gap-3 shadow-xl z-50">
                    <LucideIcon name="Award" className="text-emerald-500 animate-bounce" />
                    <div>
                      <h4 className="text-xs font-black">{toast.title}</h4>
                      <p className="text-[10px] text-slate-300">{toast.desc}</p>
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        );
      };

      // Mount Application on screen
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
